<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEMO1 - marker_to_home</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe2ea;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #ffffff 0%, var(--bg) 45%, #e9eef6 100%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }

    .stage {
      width: min(1000px, 95vw);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      padding: 16px;
    }

    .meta {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
    }

    #svg-host svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .hidden-ref {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="stage">
    <p class="meta">DEMO1: marker_to_home (click-driven phases, 1s easing, center-to-center)</p>
    <div id="svg-host" aria-label="SVG animation host"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js@3.2/dist/svg.min.js"></script>
  <script>
    const SVG_FILE = "marker_to_home.svg";
    const ANIMATION_DURATION_MS = 1000;
    const HIGHLIGHT_COLOR = "#3333ff";

    function easeInOut(t) {
      return 0.5 * (1 - Math.cos(Math.PI * t));
    }

    function labelSelector(label) {
      return '[inkscape\\:label="' + label + '"]';
    }

    function findByLabel(root, label) {
      return (
        root.querySelector(labelSelector(label)) ||
        root.querySelector('[label="' + label + '"]') ||
        root.querySelector('#' + CSS.escape(label))
      );
    }

    function placeMarker(markerNode, cx, cy) {
      const width = Number(markerNode.getAttribute("width"));
      const height = Number(markerNode.getAttribute("height"));

      markerNode.setAttribute("x", String(cx - width / 2));
      markerNode.setAttribute("y", String(cy - height / 2));
      markerNode.removeAttribute("transform");
    }

    function elementCenter(node) {
      const tag = node.tagName.toLowerCase();

      if (tag === "circle" || tag === "ellipse") {
        return {
          x: Number(node.getAttribute("cx")),
          y: Number(node.getAttribute("cy"))
        };
      }

      if (tag === "rect") {
        const x = Number(node.getAttribute("x"));
        const y = Number(node.getAttribute("y"));
        const width = Number(node.getAttribute("width"));
        const height = Number(node.getAttribute("height"));
        return { x: x + width / 2, y: y + height / 2 };
      }

      const box = node.getBBox();
      return { x: box.x + box.width / 2, y: box.y + box.height / 2 };
    }

    function animateMarkerTo(markerNode, fromCenter, toCenter, durationMs) {
      return new Promise((resolve) => {
        const startTime = performance.now();

        function frame(now) {
          const elapsed = now - startTime;
          const linearT = Math.min(1, elapsed / durationMs);
          const easedT = easeInOut(linearT);

          const x = fromCenter.x + (toCenter.x - fromCenter.x) * easedT;
          const y = fromCenter.y + (toCenter.y - fromCenter.y) * easedT;

          placeMarker(markerNode, x, y);

          if (linearT < 1) {
            requestAnimationFrame(frame);
          } else {
            resolve();
          }
        }

        requestAnimationFrame(frame);
      });
    }

    function setPhaseHighlight(labels, originalStroke, activeIndex) {
      labels.forEach((node, index) => {
        const color = index === activeIndex ? HIGHLIGHT_COLOR : originalStroke[index];
        node.style.stroke = color;
      });
    }

    async function init() {
      const host = document.getElementById("svg-host");

      const response = await fetch(SVG_FILE);
      if (!response.ok) {
        throw new Error("Could not load SVG: " + SVG_FILE);
      }

      host.innerHTML = await response.text();

      const svgElement = host.querySelector("svg");
      if (!svgElement) {
        throw new Error("Loaded file does not contain an <svg> element.");
      }

      // Adopt the loaded SVG into SVG.js so the demo explicitly uses the library.
      SVG(svgElement);

      const markerRed = findByLabel(svgElement, "marker_red");
      const markerBlu = findByLabel(svgElement, "marker_blu");
      const homeRed = findByLabel(svgElement, "home_red");
      const phase1 = findByLabel(svgElement, "txt phase 1");
      const phase2 = findByLabel(svgElement, "txt phase 2");
      const phase3 = findByLabel(svgElement, "txt phase 3");

      if (!markerRed) {
        throw new Error('Could not find marker element (expected label "marker_red").');
      }

      if (!markerBlu) {
        throw new Error('Could not find marker element (expected label "marker_blu").');
      }

      if (!homeRed) {
        throw new Error('Could not find home path element (expected label "home_red").');
      }

      if (!phase1 || !phase2 || !phase3) {
        throw new Error('Could not find all phase labels (expected "txt phase 1", "txt phase 2", "txt phase 3").');
      }

      homeRed.classList.add("hidden-ref");

      const labels = [phase1, phase2, phase3];
      const originalStroke = labels.map((node) => node.style.stroke || getComputedStyle(node).stroke || "#ff0000");
      setPhaseHighlight(labels, originalStroke, -1);

      const homeCenter = elementCenter(homeRed);
      const redStart = elementCenter(markerRed);
      const bluStart = elementCenter(markerBlu);

      let redCurrent = { x: redStart.x, y: redStart.y };
      let bluCurrent = { x: bluStart.x, y: bluStart.y };
      let phaseIndex = 0;
      let isAnimating = false;

      svgElement.style.cursor = "pointer";
      svgElement.addEventListener("click", async () => {
        if (isAnimating) {
          return;
        }

        isAnimating = true;

        try {
          if (phaseIndex === 0) {
            setPhaseHighlight(labels, originalStroke, 0);
            await animateMarkerTo(markerRed, redCurrent, homeCenter, ANIMATION_DURATION_MS);
            redCurrent = { x: homeCenter.x, y: homeCenter.y };
          } else if (phaseIndex === 1) {
            setPhaseHighlight(labels, originalStroke, 1);
            await animateMarkerTo(markerBlu, bluCurrent, homeCenter, ANIMATION_DURATION_MS);
            bluCurrent = { x: homeCenter.x, y: homeCenter.y };
          } else {
            setPhaseHighlight(labels, originalStroke, 2);
            await Promise.all([
              animateMarkerTo(markerRed, redCurrent, redStart, ANIMATION_DURATION_MS),
              animateMarkerTo(markerBlu, bluCurrent, bluStart, ANIMATION_DURATION_MS)
            ]);
            redCurrent = { x: redStart.x, y: redStart.y };
            bluCurrent = { x: bluStart.x, y: bluStart.y };
          }

          phaseIndex = (phaseIndex + 1) % 3;
        } finally {
          isAnimating = false;
        }
      });
    }

    init().catch((err) => {
      console.error(err);
      document.body.insertAdjacentHTML(
        "beforeend",
        '<p style="color:#b91c1c;font:600 14px/1.4 Segoe UI,Tahoma,sans-serif;">Animation setup failed. Check console for details.</p>'
      );
    });
  </script>
</body>
</html>
