<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEMO1 - marker_to_home</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe2ea;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #ffffff 0%, var(--bg) 45%, #e9eef6 100%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }

    .stage {
      width: min(1000px, 95vw);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      padding: 16px;
    }

    .meta {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
    }

    #svg-host svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .hidden-ref {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="stage">
    <p class="meta">DEMO1: marker_to_home (click-driven phases, 1s easing, center-to-center)</p>
    <div id="svg-host" aria-label="SVG animation host"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js@3.2/dist/svg.min.js"></script>
  <script>
    const SVG_FILE = "marker_to_home.svg";
    const ANIMATION_DURATION_MS = 1000;
    const HIGHLIGHT_COLOR = "#3333ff";

    function labelSelector(label) {
      return '[inkscape\\:label="' + label + '"]';
    }

    function findByLabel(root, label) {
      return (
        root.findOne(labelSelector(label)) ||
        root.findOne('[label="' + label + '"]') ||
        root.findOne('#' + CSS.escape(label))
      );
    }

    function requireByLabel(root, label) {
      const element = findByLabel(root, label);

      if (!element) {
        throw new Error('Could not find SVG element with label "' + label + '".');
      }

      return element;
    }

    function animateMarkerTo(marker, targetCenter) {
      return new Promise((resolve) => {
        marker
          .animate(ANIMATION_DURATION_MS)
          .ease("<>")
          .center(targetCenter.x, targetCenter.y)
          .after(() => {
            resolve();
          });
      });
    }

    function setPhaseHighlight(labels, activeIndex) {
      labels.forEach((node, index) => {
        const color = index === activeIndex ? HIGHLIGHT_COLOR : node.remember("original-stroke");
        node.css("stroke", color);
      });
    }

    async function init() {
      const host = document.getElementById("svg-host");

      const response = await fetch(SVG_FILE);
      const svgText = await response.text();
      if (!response.ok) {
        throw new Error("Could not load SVG: " + SVG_FILE);
      }

      const draw = SVG(svgText).addTo(host);
      if (!draw) {
        throw new Error("Loaded file does not contain an <svg> element.");
      }

      const markerRed = requireByLabel(draw, "marker_red");
      const markerBlu = requireByLabel(draw, "marker_blu");
      const homeRed = requireByLabel(draw, "home_red");
      const labels = ["txt phase 1", "txt phase 2", "txt phase 3"].map((label) => requireByLabel(draw, label));

      homeRed.addClass("hidden-ref");

      labels.forEach((label) => {
        label.remember("original-stroke", label.css("stroke") || label.attr("stroke") || "#ff0000");
      });
      setPhaseHighlight(labels, -1);

      const homeCenter = { x: homeRed.cx(), y: homeRed.cy() };
      markerRed.remember("start-center", { x: markerRed.cx(), y: markerRed.cy() });
      markerBlu.remember("start-center", { x: markerBlu.cx(), y: markerBlu.cy() });

      let phaseIndex = 0;
      let isAnimating = false;

      draw.css("cursor", "pointer");
      draw.on("click", async () => {
        if (isAnimating) {
          return;
        }

        isAnimating = true;

        try {
          if (phaseIndex === 0) {
            setPhaseHighlight(labels, 0);
            await animateMarkerTo(markerRed, homeCenter);
          } else if (phaseIndex === 1) {
            setPhaseHighlight(labels, 1);
            await animateMarkerTo(markerBlu, homeCenter);
          } else {
            setPhaseHighlight(labels, 2);
            await Promise.all([
              animateMarkerTo(markerRed, markerRed.remember("start-center")),
              animateMarkerTo(markerBlu, markerBlu.remember("start-center"))
            ]);
          }

          phaseIndex = (phaseIndex + 1) % 3;
        } finally {
          isAnimating = false;
        }
      });
    }

    init().catch((err) => {
      console.error(err);
      document.body.insertAdjacentHTML(
        "beforeend",
        '<p style="color:#b91c1c;font:600 14px/1.4 Segoe UI,Tahoma,sans-serif;">Animation setup failed. Check console for details.</p>'
      );
    });
  </script>
</body>
</html>
